<!-- @dsCard group="Type" viewport="700x260" name="Scale" subtitle="Compact desktop ramp, 10 → 22px" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-app); color: var(--text-primary); font-family: var(--font-sans); padding: 18px; }
  .row { display: flex; align-items: baseline; gap: 14px; padding: 5px 0; border-bottom: 1px solid var(--border); }
  .tok { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); width: 130px; flex-shrink: 0; }
  .eyebrow { text-transform: uppercase; letter-spacing: 1px; color: var(--text-tertiary); font-weight: 600; }
</style>
</head>
<body>
  <div class="row"><span class="tok">text-xl · 22</span><span style="font-size:22px;font-weight:600">Hero metric 34,2%</span></div>
  <div class="row"><span class="tok">text-lg · 17</span><span style="font-size:17px;font-weight:600">Summary stat</span></div>
  <div class="row"><span class="tok">text-md · 15</span><span style="font-size:15px;font-weight:600">View title</span></div>
  <div class="row"><span class="tok">text-sm · 13</span><span style="font-size:13px">Body & navigation item</span></div>
  <div class="row"><span class="tok">text-xs · 12</span><span style="font-size:12px">Controls and table cells</span></div>
  <div class="row"><span class="tok">text-2xs · 11</span><span style="font-size:11px">Status bar, captions</span></div>
  <div class="row" style="border:none"><span class="tok">text-micro · 10</span><span class="eyebrow" style="font-size:10px">SECTION EYEBROW</span></div>
</body>
</html>
