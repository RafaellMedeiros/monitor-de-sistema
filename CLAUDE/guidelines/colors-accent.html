<!-- @dsCard group="Colors" viewport="700x160" name="Accent & chart series" subtitle="One accent + four fixed series hues for live graphs" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-app); font-family: var(--font-sans); padding: 18px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .sw { display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 48px; border-radius: var(--radius-md); position: relative; overflow: hidden; }
  .spark { position: absolute; inset: 0; }
  .lab { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); line-height: 1.5; }
  .lab b { color: var(--text-primary); font-weight: 600; display: block; }
</style>
</head>
<body>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:var(--accent)"></div><div class="lab"><b>accent</b>#58A6FF</div></div>
    <div class="sw"><div class="chip" style="background:var(--chart-cpu)"></div><div class="lab"><b>chart-cpu</b>#58A6FF</div></div>
    <div class="sw"><div class="chip" style="background:var(--chart-mem)"></div><div class="lab"><b>chart-mem</b>#BC8CFF</div></div>
    <div class="sw"><div class="chip" style="background:var(--chart-disk)"></div><div class="lab"><b>chart-disk</b>#F0883E</div></div>
    <div class="sw"><div class="chip" style="background:var(--chart-net)"></div><div class="lab"><b>chart-net</b>#39C5CF</div></div>
  </div>
</body>
</html>
