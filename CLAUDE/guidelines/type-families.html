<!-- @dsCard group="Type" viewport="700x200" name="Families" subtitle="Plex Sans for UI, Plex Mono for all data" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-app); font-family: var(--font-sans); color: var(--text-primary); padding: 20px; display: flex; gap: 16px; }
  .col { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .eyebrow { font-size: 10px; letter-spacing: 1.4px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; }
  .big { font-size: 34px; font-weight: 600; line-height: 1.1; }
  .mono { font-family: var(--font-mono); }
  .note { font-size: 11px; color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="col">
    <span class="eyebrow">IBM Plex Sans</span>
    <span class="big">Dashboard</span>
    <span class="note">Labels, headings, controls, prose. Weights 400 / 500 / 600 / 700.</span>
  </div>
  <div class="col">
    <span class="eyebrow">IBM Plex Mono</span>
    <span class="big mono">34,2% 18412</span>
    <span class="note">Every number, PID, byte count and axis tick. Weights 400 / 500 / 600.</span>
  </div>
</body>
</html>
