<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale" subtitle="2 → 16px, drives padding and fl/grid gaps" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-app); font-family: var(--font-sans); padding: 20px; display: flex; gap: 16px; align-items: flex-end; }
  .sw { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .bar { background: var(--accent); border-radius: 2px; width: 100%; }
  .lab { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); }
  .lab b { display: block; color: var(--text-primary); font-weight: 600; }
</style>
</head>
<body>
  <div class="sw" style="width:24px"><div class="bar" style="height:2px"></div><div class="lab"><b>1</b>2</div></div>
  <div class="sw" style="width:34px"><div class="bar" style="height:4px"></div><div class="lab"><b>2</b>4</div></div>
  <div class="sw" style="width:42px"><div class="bar" style="height:7px"></div><div class="lab"><b>3</b>7</div></div>
  <div class="sw" style="width:50px"><div class="bar" style="height:8px"></div><div class="lab"><b>4</b>8</div></div>
  <div class="sw" style="width:58px"><div class="bar" style="height:10px"></div><div class="lab"><b>5</b>10</div></div>
  <div class="sw" style="width:66px"><div class="bar" style="height:12px"></div><div class="lab"><b>6</b>12</div></div>
  <div class="sw" style="width:74px"><div class="bar" style="height:14px"></div><div class="lab"><b>7</b>14</div></div>
  <div class="sw" style="width:82px"><div class="bar" style="height:16px"></div><div class="lab"><b>8</b>16</div></div>
</body>
</html>
