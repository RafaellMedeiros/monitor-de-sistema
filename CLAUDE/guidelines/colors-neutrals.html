<!-- @dsCard group="Colors" viewport="700x190" name="Neutrals — Dark" subtitle="Near-black blue surfaces, three text tiers" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-app); font-family: var(--font-sans); padding: 18px; }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 56px; border-radius: var(--radius-md); border: 1px solid var(--border); }
  .lab { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); line-height: 1.5; }
  .lab b { color: var(--text-primary); font-weight: 600; display: block; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ink-950)"></div><div class="lab"><b>bg-app</b>#0B0E13</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-900)"></div><div class="lab"><b>bg-surface</b>#11151C</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-850)"></div><div class="lab"><b>bg-raised</b>#1A2129</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-800)"></div><div class="lab"><b>bg-track</b>#232C38</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-100)"></div><div class="lab"><b>text-primary</b>#E6EBF2</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-400)"></div><div class="lab"><b>text-secondary</b>#9AA6B5</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-500)"></div><div class="lab"><b>text-tertiary</b>#5E6B7C</div></div>
  </div>
</body>
</html>
